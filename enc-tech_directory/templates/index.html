<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enc-Tech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main" id="main">
        {% for texto in textos %}
        <div class="curso-section">{{ texto | safe }}</div>
        {% endfor %}
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var element = document.getElementById('main');
            // Regex para encontrar texto entre **
            element.innerHTML = element.innerHTML.replace(/\*\*(.*?)\*\*/g, '<strong style="margin:5px">$1</strong>');
            element.innerHTML = element.innerHTML.replace(/-XX-(.*?)-XX-/g, '<h1>$1</h1>');
            element.innerHTML = element.innerHTML.replace(/####/g, "");
        });
    </script>
</body>
</html>
